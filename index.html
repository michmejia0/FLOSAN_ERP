function filtrarDieselEq() {
  dieselEqFiltroEquipo = document.getElementById('filtroDieselEq').value;
  renderDieselEqTable();
}
function limpiarFiltrosDieselEq() {
  dieselEqFiltroEquipo = 'todos';
  document.getElementById('filtroDieselEq').value = 'todos';
  renderDieselEqTable();
}

function agregarDieselEq() {
  const hoy = new Date().toISOString().split('T')[0];
  dieselEqData.push({ fecha: hoy, equipo: 'retro_bobcat', litros: 0, costo: 0 });
  guardarDatos();
  renderDieselEqTable();
}

function eliminarDieselEq(i) {
  dieselEqData.splice(i, 1);
  recalcDieselEnGastos();
  guardarDatos();
  renderDieselEqTable();
}

function confirmarEliminarDieselEq(i) {
  const eq = DIESEL_LABELS[dieselEqData[i].equipo] || 'este equipo';
  if (confirm(`¿Eliminar el registro de "${eq}"?\nEsta acción no se puede deshacer.`)) eliminarDieselEq(i);
}

function updateDieselEq(i, campo, val) {
  dieselEqData[i][campo] = (campo==='litros'||campo==='costo') ? (parseFloat(val)||0) : val;
  if (campo==='costo' || campo==='fecha') recalcDieselEnGastos();
  guardarDatos();
  // Para litros/costo NO reconstruimos toda la tabla: así puedes ir agregando
  // costo tras costo (aunque sean del mismo equipo) sin perder el campo que
  // estás editando ni el foco al pasar de un input a otro con Tab.
  if (campo === 'litros' || campo === 'costo') {
    refreshDieselEqAggregates();
  } else {
    renderDieselEqTable();
  }
}

function guardarDieselEqFila(i) {
  const row = document.getElementById('diesel-row-' + i);
  if (row) {
    const dateInput = row.querySelector('input[type="date"]');
    if (dateInput) dieselEqData[i].fecha = dateInput.value;
    const sel = row.querySelector('select');
    if (sel) dieselEqData[i].equipo = sel.value;
    const editables = row.querySelectorAll('input.editable');
    if (editables[0]) dieselEqData[i].litros = parseFloat(editables[0].value) || 0;
    if (editables[1]) dieselEqData[i].costo = parseFloat(editables[1].value) || 0;
  }
  recalcDieselEnGastos();
  guardarDatos();
  refreshDieselEqAggregates();
  if (row) {
    row.style.transition = 'background .1s';
    row.style.background = '#fee2e2';
    setTimeout(() => { row.style.background = ''; }, 700);
  }
}

function calcPorEquipoDiesel() {
  const porEquipo = {};
  DIESEL_EQUIPOS.forEach(eq => porEquipo[eq] = { litros:0, costo:0, regs:0 });
  dieselEqData.forEach(r => {
    if (!porEquipo[r.equipo]) porEquipo[r.equipo] = { litros:0, costo:0, regs:0 };
    porEquipo[r.equipo].litros += r.litros||0;
    porEquipo[r.equipo].costo += r.costo||0;
    porEquipo[r.equipo].regs++;
  });
  return porEquipo;
}

function refreshDieselEqAggregates() {
  const summary = document.getElementById('dieselEqSummary');
  const porEquipoEl = document.getElementById('dieselEqPorEquipo');

  const totalLitros = dieselEqData.reduce((s,r)=>s+(r.litros||0),0);
  const totalCosto = dieselEqData.reduce((s,r)=>s+(r.costo||0),0);
  if (summary) summary.innerHTML = `
    <div class="viaje-stat"><div class="viaje-stat-label">Total Registros</div><div class="viaje-stat-val" style="color:#dc2626">${dieselEqData.length}</div></div>
    <div class="viaje-stat"><div class="viaje-stat-label">Total Litros</div><div class="viaje-stat-val" style="color:#1d4ed8;font-size:17px">${totalLitros.toLocaleString('es-MX')} L</div></div>
    <div class="viaje-stat"><div class="viaje-stat-label">Total Costo (gasto)</div><div class="viaje-stat-val" style="color:#dc2626;font-size:17px">${fmt(totalCosto)}</div></div>`;

  // Resumen por equipo
  const porEquipo = calcPorEquipoDiesel();
  if (porEquipoEl) {
    porEquipoEl.innerHTML = `<table class="viajes-table"><thead><tr><th>Equipo</th><th style="text-align:right">Registros</th><th style="text-align:right">Litros</th><th style="text-align:right">Costo</th></tr></thead><tbody>
      ${DIESEL_EQUIPOS.map(eq => {
        const d = porEquipo[eq]; const tc = DIESEL_COLORS[eq];
        return `<tr><td><span style="background:${tc.bg};color:${tc.text};padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;">${DIESEL_LABELS[eq]}</span></td>
          <td style="text-align:right">${d.regs}</td>
          <td style="text-align:right">${d.litros>0?d.litros.toLocaleString('es-MX')+' L':'—'}</td>
          <td style="text-align:right;color:#dc2626;font-weight:600">${d.costo>0?fmt(d.costo):'—'}</td></tr>`;
      }).join('')}
      <tr style="font-weight:600;background:var(--gray-50);">
        <td>TOTAL</td><td style="text-align:right">${dieselEqData.length}</td>
        <td style="text-align:right">${totalLitros.toLocaleString('es-MX')} L</td>
        <td style="text-align:right;color:#dc2626">${fmt(totalCosto)}</td>
      </tr>
    </tbody></table>`;
  }

  renderDieselCharts(porEquipo, totalLitros, totalCosto);
}

function renderDieselCharts(porEquipo, totalLitros, totalCosto) {
  porEquipo = porEquipo || calcPorEquipoDiesel();

  // ── Gráfica 1: gasto por unidad ──
  const equiposConDatos = DIESEL_EQUIPOS.filter(eq => (porEquipo[eq]?.regs || 0) > 0);
  const listaEquiposUnidad = (equiposConDatos.length ? equiposConDatos : DIESEL_EQUIPOS);
  const labelsUnidad = listaEquiposUnidad.map(eq => DIESEL_LABELS[eq]);
  const dataUnidad = listaEquiposUnidad.map(eq => porEquipo[eq]?.costo || 0);
  const dataLitrosUnidad = listaEquiposUnidad.map(eq => porEquipo[eq]?.litros || 0);
  const colorsUnidad = listaEquiposUnidad.map(eq => DIESEL_COLORS[eq]?.text || '#dc2626');

  if (dieselChartUnidad) { dieselChartUnidad.destroy(); dieselChartUnidad = null; }
  const cu = document.getElementById('dieselChartUnidad');
  if (cu) dieselChartUnidad = new Chart(cu, {
    type: 'bar',
    data: { labels: labelsUnidad, datasets: [
      {
        label: 'Costo',
        data: dataUnidad,
        backgroundColor: colorsUnidad.map(c => c + 'bb'),
        borderColor: colorsUnidad, borderWidth: 1, borderRadius: 3,
        xAxisID: 'xCosto'
      },
      {
        label: 'Litros',
        data: dataLitrosUnidad,
        backgroundColor: colorsUnidad.map(c => c + '55'),
        borderColor: colorsUnidad, borderWidth: 1, borderRadius: 3,
        xAxisID: 'xLitros'
      }
    ]},
    options: { indexAxis: 'y', responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:true, position:'top', align:'end', labels:{font:{size:10}, boxWidth:12, color:'#64748b'}},
        tooltip:{callbacks:{label:ctx=> ctx.dataset.label==='Costo' ? ('Costo: '+fmt(ctx.parsed.x||0)) : ('Litros: '+(ctx.parsed.x||0).toLocaleString('es-MX')+' L')}}
      },
      scales:{
        y:{ticks:{font:{size:10},color:'#94a3b8'},grid:{display:false}},
        xCosto:{position:'bottom',ticks:{font:{size:10},color:'#94a3b8',callback:v=>'$'+(v/1000).toFixed(0)+'k'},grid:{color:'rgba(0,0,0,0.05)'}},
        xLitros:{position:'top',ticks:{font:{size:10},color:'#94a3b8',callback:v=>v+'L'},grid:{display:false}}
      }}
  });

  // ── Gráfica 2: consumo acumulado en el tiempo ──
  const ordenados = [...dieselEqData].filter(r=>r.fecha).sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
  let acumulado = 0;
  const labelsAcum = [];
  const dataAcum = [];
  ordenados.forEach(r => {
    acumulado += parseFloat(r.costo) || 0;
    labelsAcum.push(new Date(r.fecha+'T12:00:00').toLocaleDateString('es-MX',{day:'2-digit',month:'short'}));
    dataAcum.push(acumulado);
  });

  if (dieselChartAcumulado) { dieselChartAcumulado.destroy(); dieselChartAcumulado = null; }
  const ca = document.getElementById('dieselChartAcumulado');
  if (ca) dieselChartAcumulado = new Chart(ca, {
    type: 'line',
    data: { labels: labelsAcum, datasets: [{
      data: dataAcum, borderColor: '#dc2626', backgroundColor: 'rgba(220,38,38,0.1)',
      borderWidth: 2, pointRadius: labelsAcum.length>25?0:3, fill: true, tension: 0.25
    }]},
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false},
      tooltip:{callbacks:{label:ctx=>fmt(ctx.parsed.y||0)}}},
      scales:{
        x:{ticks:{autoSkip:true,maxTicksLimit:8,font:{size:10},color:'#94a3b8'},grid:{display:false}},
        y:{ticks:{font:{size:10},color:'#94a3b8',callback:v=>'$'+(v/1000).toFixed(0)+'k'},grid:{color:'rgba(0,0,0,0.05)'}}
      }}
  });
}

function renderDieselEqTable() {
  const tbody = document.getElementById('dieselEqTbody');
  const empty = document.getElementById('dieselEqEmpty');
  const countEl = document.getElementById('dieselEqCount');
  if (!tbody) return;

  const filtered = dieselEqData.filter(r => dieselEqFiltroEquipo === 'todos' || r.equipo === dieselEqFiltroEquipo);
  const realIndices = dieselEqData.reduce((acc, r, i) => {
    if (dieselEqFiltroEquipo === 'todos' || r.equipo === dieselEqFiltroEquipo) acc.push(i);
    return acc;
  }, []);

  if (countEl) countEl.textContent = `${filtered.length} registro${filtered.length!==1?'s':''}`;

  refreshDieselEqAggregates();

  if (filtered.length === 0) { tbody.innerHTML=''; if(empty) empty.style.display='block'; return; }
  if (empty) empty.style.display = 'none';

  tbody.innerHTML = filtered.map((r, fi) => {
    const ri = realIndices[fi];
    const tc = DIESEL_COLORS[r.equipo] || {bg:'#fee2e2',text:'#dc2626'};
    return `<tr id="diesel-row-${ri}">
      <td style="color:var(--gray-400);font-size:11px">${fi+1}</td>
      <td><input type="date" class="viaje-input-date" value="${r.fecha}" onchange="updateDieselEq(${ri},'fecha',this.value)"/></td>
      <td>
        <select class="viaje-select-inline" onchange="updateDieselEq(${ri},'equipo',this.value)" style="color:${tc.text};background:${tc.bg}">
          ${DIESEL_EQUIPOS.map(t=>`<option value="${t}" ${r.equipo===t?'selected':''}>${DIESEL_LABELS[t]}</option>`).join('')}
        </select>
      </td>
      <td style="text-align:right">
        <input class="editable" type="number" value="${r.litros||''}" placeholder="0" style="max-width:80px;color:#1d4ed8;" onchange="updateDieselEq(${ri},'litros',this.value)"/>
      </td>
      <td style="text-align:right">
        <input class="editable" type="number" value="${r.costo||''}" placeholder="0" style="max-width:90px;color:#dc2626;font-weight:600;" onchange="updateDieselEq(${ri},'costo',this.value)"/>
      </td>
      <td>
        <div class="acciones-cell">
          <button class="btn-viaje-save" onclick="guardarDieselEqFila(${ri})">
            <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><path d="M2 7l4 4 6-7"/></svg>
            Guardar
          </button>
          <button class="btn-viaje-del" onclick="confirmarEliminarDieselEq(${ri})">
            <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><line x1="2" y1="2" x2="12" y2="12"/><line x1="12" y1="2" x2="2" y2="12"/></svg>
            Eliminar
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');
}
function imprimirGraficasDiesel(modo) {
  // modo: 'ambas' | 'unidad' | 'acumulado'
  if (!dieselChartUnidad && !dieselChartAcumulado) { alert('Aún no hay gráficas para imprimir.'); return; }
  const hoy = new Date().toLocaleDateString('es-MX', { day:'2-digit', month:'long', year:'numeric' });

  const bloques = [];
  if ((modo === 'ambas' || modo === 'unidad') && dieselChartUnidad) {
    bloques.push({ titulo:'Gastos de Diesel por Unidad', img: dieselChartUnidad.toBase64Image() });
  }
  if ((modo === 'ambas' || modo === 'acumulado') && dieselChartAcumulado) {
    bloques.push({ titulo:'Consumo Acumulado', img: dieselChartAcumulado.toBase64Image() });
  }
  if (!bloques.length) { alert('Aún no hay gráficas para imprimir.'); return; }

  const bloquesHtml = bloques.map(b => `
    <div class="grafica-bloque">
      <div class="section-title">${b.titulo}</div>
      <img src="${b.img}" style="width:100%;max-height:420px;object-fit:contain;border:1px solid #e2e8f0;border-radius:8px;padding:10px;background:#fff" />
    </div>`).join('');

  const html = `<!DOCTYPE html><html lang="es"><head>
<meta charset="UTF-8"><title>FLOSAN — Gráficas de Diesel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;color:#0f172a;background:#fff;padding:32px;font-size:13px}@media print{body{padding:20px}}.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;padding-bottom:18px;border-bottom:2px solid #0f172a}.brand{font-size:22px;font-weight:700}.brand em{color:#dc2626;font-style:normal}.section-title{font-size:12px;font-weight:700;color:#334155;text-transform:uppercase;letter-spacing:.5px;margin:0 0 10px;padding-bottom:6px;border-bottom:1px solid #e2e8f0}.grafica-bloque{margin-bottom:28px;page-break-inside:avoid}.footer{margin-top:32px;padding-top:12px;border-top:1px solid #e2e8f0;font-size:10.5px;color:#94a3b8;display:flex;justify-content:space-between}.no-print{margin-bottom:20px;display:flex;gap:8px}.btn{display:inline-flex;align-items:center;gap:5px;background:#0f172a;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif}.btn-sec{background:#f1f5f9;color:#334155;border:1px solid #e2e8f0}@media print{.no-print{display:none!important}}</style>
</head><body>
<div class="no-print"><button class="btn" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button><button class="btn btn-sec" onclick="window.close()">✕ Cerrar</button></div>
<div class="header">
  <div><div class="brand">FLOS<em>AN</em> <span style="font-size:13px;font-weight:400;color:#64748b">· Diesel 2026</span></div><div style="font-size:11px;color:#64748b;margin-top:4px">Gráficas de Diesel${modo==='ambas'?' (ambas)':modo==='unidad'?' — por unidad':' — consumo acumulado'}</div></div>
  <div style="text-align:right"><div style="font-size:11px;color:#64748b">Generado el</div><div style="font-weight:600;font-size:12px">${hoy}</div></div>
</div>
${bloquesHtml}
<div class="footer"><span>FLOSAN Control Financiero</span><span>Generado automáticamente</span></div>
</body></html>`;

  const w = window.open('', '_blank');
  if (!w) { alert('Permite las ventanas emergentes para poder imprimir.'); return; }

function filtrarViajes() {
  viajesFiltroTipo = document.getElementById('filtroTipo').value;
  viajesFiltroColumna = document.getElementById('filtroColumna').value;
  renderViajesTable();
}

function limpiarFiltrosViajes() {
  viajesFiltroTipo = 'todos';
  viajesFiltroColumna = 'todos';
  document.getElementById('filtroTipo').value = 'todos';
  document.getElementById('filtroColumna').value = 'todos';
  renderViajesTable();
}

function agregarViaje() {
  const hoy = new Date().toISOString().split('T')[0];
  viajesData.push({ fecha: hoy, cliente: '', tipo: 'arena', columna: '7m', monto: 0, montoFinal: 0 });
  guardarDatos();
  renderViajesTable();
}

function eliminarViaje(i) {
  viajesData.splice(i, 1);
  recalcViajesEnIngresos();
  guardarDatos();
  renderViajesTable();
  if (document.getElementById('clienteDashSection').style.display !== 'none') renderClienteDash();
}

function guardarViajeFila(i) {
  // Leer los valores actuales directamente de los inputs de esa fila
  const row = document.getElementById('viaje-row-' + i);
  if (row) {
    const inputs = row.querySelectorAll('input, select');
    // fecha
    const dateInput = row.querySelector('input[type="date"]');
    if (dateInput) viajesData[i].fecha = dateInput.value;
    // cliente
    const clienteInput = row.querySelector('input.viaje-input');
    if (clienteInput) viajesData[i].cliente = clienteInput.value;
    // tipo
    const selects = row.querySelectorAll('select');
    if (selects[0]) viajesData[i].tipo = selects[0].value;
    if (selects[1]) viajesData[i].columna = selects[1].value;
    // montos
    const editables = row.querySelectorAll('input.editable');
    if (editables[0]) viajesData[i].monto = parseFloat(editables[0].value) || 0;
    if (editables[1]) viajesData[i].montoFinal = parseFloat(editables[1].value) || 0;
  }
  recalcViajesEnIngresos();
  guardarDatos();
  // Flash visual de guardado
  if (row) {
    row.style.transition = 'background .1s';
    row.style.background = '#dcfce7';
    setTimeout(() => { row.style.background = ''; }, 700);
  }
  if (document.getElementById('clienteDashSection').style.display !== 'none') renderClienteDash();
}

function confirmarEliminarViaje(i) {
  const cliente = viajesData[i].cliente || 'sin nombre';
  if (confirm(`¿Eliminar el viaje del cliente "${cliente}"?\nEsta acción no se puede deshacer.`)) {
    eliminarViaje(i);
  }
}

let clienteDashVisible = false;
function toggleClienteDash() {
  clienteDashVisible = !clienteDashVisible;
  const sec = document.getElementById('clienteDashSection');
  if (clienteDashVisible) {
    sec.style.display = 'block';
    renderClienteDash();
    sec.scrollIntoView({ behavior: 'smooth', block: 'start' });

    sec.style.display = 'none';

}

    const norm = key.toLowerCase();
    if (!grupos[norm]) grupos[norm] = { nombre: key, viajes: [] };
    grupos[norm].viajes.push(v);

  const clientes = Object.values(grupos);

    const tiposRows = Object.entries(porTipo).map(([tipo, d]) => `

          <div>

          </div>
        </div>

            Margen ${margen}%
          </div>
          <button class="btn-print-cliente" onclick="imprimirCliente('${cli.nombre.replace(/'/g,"\\'")}')" title="Imprimir dashboard de este cliente">

function updateViaje(i, campo, val) {
  viajesData[i][campo] = (campo==='monto'||campo==='montoFinal') ? (parseFloat(val)||0) : val;
  if (campo==='montoFinal' || campo==='fecha') recalcViajesEnIngresos();
  guardarDatos();
  renderViajesTable();
}

// Suma los montoFinal de cada viaje al item "Viajes" de Ingresos Rentas, por mes
function recalcViajesEnIngresos() {
  const modRentas = MODULES.find(m => m.id === 'ing_rentas');
  if (!modRentas) return;
  let itemViajes = modRentas.items.find(it => it.isViajes);
  if (!itemViajes) return;
  const nuevos = new Array(12).fill(0);
  viajesData.forEach(v => {
    const mes = new Date(v.fecha + 'T12:00:00').getMonth(); // 0-11
    nuevos[mes] += parseFloat(v.montoFinal) || 0;
  });
  itemViajes.vals = nuevos;
  // re-render tabla de rentas si está visible
  renderModuleTable(modRentas);
  refreshDashboard();
  guardarDatos();
}

function renderViajesTable() {
  const tbody = document.getElementById('viajesTbody');
  const empty = document.getElementById('viajesEmpty');
  const summary = document.getElementById('viajesSummary');
  const countEl = document.getElementById('viajesCount');
  if (!tbody) return;

  // filtrar
  const filtered = viajesData.filter((v,i) => {
    const okTipo = viajesFiltroTipo === 'todos' || v.tipo === viajesFiltroTipo;
    const okCol = viajesFiltroColumna === 'todos' || v.columna === viajesFiltroColumna;
    return okTipo && okCol;
  });

  // índices reales para edición
  const realIndices = viajesData.reduce((acc, v, i) => {
    const okTipo = viajesFiltroTipo === 'todos' || v.tipo === viajesFiltroTipo;
    const okCol = viajesFiltroColumna === 'todos' || v.columna === viajesFiltroColumna;
    if (okTipo && okCol) acc.push(i);
    return acc;
  }, []);

  if (countEl) countEl.textContent = `${filtered.length} viaje${filtered.length!==1?'s':''}`;

  // summary stats
  const total4m = viajesData.filter(v=>v.columna==='7m').length;
  const total14m = viajesData.filter(v=>v.columna==='14m').length;
  const tipos = ['arena','grava','tepetate','escombro','balastro'];
  const masComun = tipos.reduce((a,t) => {
    const c = viajesData.filter(v=>v.tipo===t).length;
    return c > (viajesData.filter(v=>v.tipo===a).length) ? t : a;
  }, 'arena');
  if (summary) summary.innerHTML = `
    <div class="viaje-stat"><div class="viaje-stat-label">Total viajes</div><div class="viaje-stat-val">${viajesData.length}</div></div>
    <div class="viaje-stat"><div class="viaje-stat-label">Columna 7M / 14M</div><div class="viaje-stat-val">${total4m} <span style="color:var(--gray-400);font-size:14px">/ ${total14m}</span></div></div>
    <div class="viaje-stat"><div class="viaje-stat-label">Total Monto Final (ingresos)</div><div class="viaje-stat-val" style="color:#16a34a;font-size:17px">${fmt(viajesData.reduce((s,v)=>s+(v.montoFinal||0),0))}</div></div>`;

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    if (empty) empty.style.display = 'block';
    return;
  }
  if (empty) empty.style.display = 'none';

  tbody.innerHTML = filtered.map((v, fi) => {
    const ri = realIndices[fi];
    return `<tr id="viaje-row-${ri}">
      <td style="color:var(--gray-400);font-size:11px">${fi+1}</td>
      <td><input type="date" class="viaje-input-date" value="${v.fecha}" onchange="updateViaje(${ri},'fecha',this.value)"/></td>
      <td><input class="viaje-input" type="text" value="${v.cliente}" placeholder="Nombre del cliente…" onchange="updateViaje(${ri},'cliente',this.value)"/></td>
      <td>
        <select class="viaje-select-inline" onchange="updateViaje(${ri},'tipo',this.value)"
          style="color:${v.tipo==='arena'?'#854d0e':v.tipo==='grava'?'#0369a1':v.tipo==='tepetate'?'#7e22ce':v.tipo==='escombro'?'#991b1b':'#166534'};background:${v.tipo==='arena'?'#fef9c3':v.tipo==='grava'?'#e0f2fe':v.tipo==='tepetate'?'#f3e8ff':v.tipo==='escombro'?'#fee2e2':'#dcfce7'}">
          <option value="arena" ${v.tipo==='arena'?'selected':''}>Arena</option>
          <option value="grava" ${v.tipo==='grava'?'selected':''}>Grava</option>
          <option value="tepetate" ${v.tipo==='tepetate'?'selected':''}>Tepetate</option>
          <option value="escombro" ${v.tipo==='escombro'?'selected':''}>Escombro</option>
          <option value="balastro" ${v.tipo==='balastro'?'selected':''}>Balastro</option>
        </select>
      </td>
      <td>
        <select class="viaje-select-inline" onchange="updateViaje(${ri},'columna',this.value)"
          style="color:${v.columna==='7m'?'#1d4ed8':'#92400e'};background:${v.columna==='7m'?'#dbeafe':'#fef3c7'}">
          <option value="7m" ${v.columna==='7m'?'selected':''}>7 M</option>
          <option value="14m" ${v.columna==='14m'?'selected':''}>14 M</option>
        </select>
      </td>
      <td style="text-align:right">
        <input class="editable" type="number" value="${v.monto||''}" placeholder="0"
          style="max-width:90px;color:#dc2626;"

        <input class="editable" type="number" value="${v.montoFinal||''}" placeholder="0"

  // Reunir datos del cliente
  const key = nombreCliente.trim().toLowerCase();

  const totalFinal = viajes.reduce((s,v) => s + (v.montoFinal||0), 0);

  const hoy = new Date().toLocaleDateString('es-MX', { day:'2-digit', month:'long', year:'numeric' });

function onNominaPuestoChange() {
  const puesto = document.getElementById('nominaPuestoSel').value;
  const nombreInput = document.getElementById('nominaNombreInput');
  const salarioInput = document.getElementById('nominaSalarioInput');
  const lista = document.getElementById('nominaNombreList');
  if (!puesto) {
    nombreInput.value = '';
    nombreInput.disabled = true;
    nombreInput.placeholder = 'Ej: Juan Pérez';
    lista.innerHTML = '';
    salarioInput.value = '';
    actualizarTotalNominaPreview();
    return;
  }
  const cat = NOMINA_CATALOG[puesto];
  nombreInput.disabled = false;
  nombreInput.value = '';
  nombreInput.placeholder = 'Escribe el nombre…';
  lista.innerHTML = Object.keys(cat.personas).map(p => `<option value="${p}">`).join('');
  salarioInput.value = '';
  actualizarTotalNominaPreview();
}

// El nombre se escribe manualmente. Si coincide con alguien ya conocido dentro
// del catálogo del puesto seleccionado, se sugiere su salario fijo ya establecido,
// pero el campo de salario siempre queda editable por si es una persona nueva.
function onNominaNombreInput() {
  const puesto = document.getElementById('nominaPuestoSel').value;
  const nombre = document.getElementById('nominaNombreInput').value.trim();
  const salarioInput = document.getElementById('nominaSalarioInput');
  if (!puesto || !nombre) return;
  const cat = NOMINA_CATALOG[puesto];
  const match = Object.keys(cat.personas).find(p => p.toLowerCase() === nombre.toLowerCase());
  if (match) salarioInput.value = cat.personas[match];
  actualizarTotalNominaPreview();
}

// Muestra/oculta los campos de caja de ahorro, horas extra y viáticos.
// Si el checkbox queda sin marcar, el campo se limpia y NO afecta el salario.
function toggleNominaExtra(tipo) {
  const map = {
    ahorro:      { check: 'nominaAhorroCheck',      wrap: 'nominaAhorroWrap',      input: 'nominaAhorroInput' },
    horasExtra:  { check: 'nominaHorasExtraCheck',  wrap: 'nominaHorasExtraWrap',  input: 'nominaHorasExtraInput' },
    viaticos:    { check: 'nominaViaticosCheck',    wrap: 'nominaViaticosWrap',    input: 'nominaViaticosInput' },
    martillo:    { check: 'nominaMartilloCheck',    wrap: 'nominaMartilloWrap',    input: 'nominaMartilloInput' },
  };
  const cfg = map[tipo];
  const checked = document.getElementById(cfg.check).checked;
  document.getElementById(cfg.wrap).style.display = checked ? 'flex' : 'none';
  if (!checked) document.getElementById(cfg.input).value = '';
  actualizarTotalNominaPreview();
}

// Recalcula en vivo el total a pagar mientras se llena el formulario.
function actualizarTotalNominaPreview() {
  const salario = parseFloat(document.getElementById('nominaSalarioInput').value) || 0;
  const horasExtra = document.getElementById('nominaHorasExtraCheck').checked
    ? (parseFloat(document.getElementById('nominaHorasExtraInput').value) || 0) : 0;
  const viaticos = document.getElementById('nominaViaticosCheck').checked
    ? (parseFloat(document.getElementById('nominaViaticosInput').value) || 0) : 0;
  const martillo = document.getElementById('nominaMartilloCheck').checked
    ? (parseFloat(document.getElementById('nominaMartilloInput').value) || 0) : 0;
  const ahorro = document.getElementById('nominaAhorroCheck').checked
    ? (parseFloat(document.getElementById('nominaAhorroInput').value) || 0) : 0;
  const total = salario + horasExtra + viaticos + martillo - ahorro;
  const el = document.getElementById('nominaTotalPreview');
  if (el) el.textContent = fmt(total) === '—' ? '$0' : fmt(total);
}

function mostrarMsgNomina(texto, tipo) {
  const msg = document.getElementById('nominaFormMsg');
  msg.textContent = texto;
  msg.style.display = 'block';
  msg.style.background = tipo === 'error' ? '#fef3c7' : '#dcfce7';
  msg.style.color = tipo === 'error' ? '#92400e' : '#16a34a';
  setTimeout(() => { msg.style.display = 'none'; }, tipo === 'error' ? 3000 : 2500);
}

function agregarNomina() {
  const puesto = document.getElementById('nominaPuestoSel').value;
  const persona = document.getElementById('nominaNombreInput').value.trim();
  const salarioBase = parseFloat(document.getElementById('nominaSalarioInput').value) || 0;

  const tieneAhorro = document.getElementById('nominaAhorroCheck').checked;
  const descuentoAhorro = tieneAhorro ? (parseFloat(document.getElementById('nominaAhorroInput').value) || 0) : 0;

  const tieneHorasExtra = document.getElementById('nominaHorasExtraCheck').checked;
  const horasExtra = tieneHorasExtra ? (parseFloat(document.getElementById('nominaHorasExtraInput').value) || 0) : 0;

  const tieneViaticos = document.getElementById('nominaViaticosCheck').checked;
  const viaticos = tieneViaticos ? (parseFloat(document.getElementById('nominaViaticosInput').value) || 0) : 0;

  const tieneMartillo = document.getElementById('nominaMartilloCheck').checked;
  const martillo = tieneMartillo ? (parseFloat(document.getElementById('nominaMartilloInput').value) || 0) : 0;

  if (!puesto || !persona) {
    mostrarMsgNomina('⚠️ Selecciona el tipo de persona y escribe su nombre antes de agregar.', 'error');
    return;
  }
  if (salarioBase <= 0) {
    mostrarMsgNomina('⚠️ El salario fijo debe ser mayor a $0.', 'error');
    return;
  }
  if (tieneAhorro && descuentoAhorro <= 0) {
    mostrarMsgNomina('⚠️ Indica el monto del descuento de caja de ahorro, o desmarca la casilla.', 'error');
    return;
  }
  if (tieneHorasExtra && horasExtra <= 0) {
    mostrarMsgNomina('⚠️ Indica el monto de horas extra, o desmarca la casilla.', 'error');
    return;
  }
  if (tieneViaticos && viaticos <= 0) {
    mostrarMsgNomina('⚠️ Indica el monto de viáticos, o desmarca la casilla.', 'error');
    return;
  }
  if (tieneMartillo && martillo <= 0) {
    mostrarMsgNomina('⚠️ Indica el monto de Hrs. Rotomartillo, o desmarca la casilla.', 'error');
    return;
  }
  if (descuentoAhorro > (salarioBase + horasExtra + viaticos + martillo)) {
    mostrarMsgNomina('⚠️ El descuento de caja de ahorro no puede ser mayor al total a pagar.', 'error');
    return;
  }

  const montoNeto = salarioBase + horasExtra + viaticos + martillo - descuentoAhorro;
  const registro = {
    puesto, persona, salarioBase,
    tieneHorasExtra, horasExtra,
    tieneViaticos, viaticos,
    tieneMartillo, martillo,
    tieneAhorro, descuentoAhorro,
    monto: montoNeto,
    mesIndex: new Date().getMonth(),
    fecha: new Date().toLocaleDateString('es-MX', { day:'2-digit', month:'short', year:'numeric' })
  };

  nominaData.push(registro);
  recalcNominaEnGastos();
  guardarDatos();
  renderNominaTable();

  // Reset form
  document.getElementById('nominaPuestoSel').value = '';
  document.getElementById('nominaNombreInput').value = '';
  document.getElementById('nominaNombreInput').disabled = true;
  document.getElementById('nominaNombreList').innerHTML = '';
  document.getElementById('nominaSalarioInput').value = '';
  ['Ahorro','HorasExtra','Viaticos','Martillo'].forEach(t => {
    document.getElementById(`nomina${t}Check`).checked = false;
    document.getElementById(`nomina${t}Wrap`).style.display = 'none';
    document.getElementById(`nomina${t}Input`).value = '';
  });
  actualizarTotalNominaPreview();

  mostrarMsgNomina(`✅ ${persona} agregado/a — total a pagar: $${montoNeto.toLocaleString('es-MX')}.`, 'ok');
  generarTicketNomina(registro);
}

function eliminarNomina(i) {
  const r = nominaData[i];
  if (confirm(`¿Eliminar el registro de "${r.persona}" ($${r.monto.toLocaleString('es-MX')})?\nEsta acción no se puede deshacer.`)) {
    nominaData.splice(i, 1);
    recalcNominaEnGastos();
    guardarDatos();
    renderNominaTable();
  }
}

function updateNominaVal(i, campo, val) {
  const r = nominaData[i];
  if (['salarioBase','horasExtra','viaticos','martillo','descuentoAhorro'].includes(campo)) {
    r[campo] = parseFloat(val) || 0;
    r.monto = (r.salarioBase||0) + (r.horasExtra||0) + (r.viaticos||0) + (r.martillo||0) - (r.descuentoAhorro||0);
    recalcNominaEnGastos();
  } else {
    r[campo] = val;
  }
  guardarDatos();
  renderNominaTable();
}

function limpiarFiltroNomina() {
  const sel = document.getElementById('nominaFiltroSel');
  if (sel) sel.value = 'todos';
  renderNominaTable();
}

function renderNominaTable() {
  const tbody = document.getElementById('nominaTbody');
  const empty = document.getElementById('nominaEmpty');
  const summary = document.getElementById('nominaSummary');
  const countEl = document.getElementById('nominaCount');
  if (!tbody) return;

  const filtro = (document.getElementById('nominaFiltroSel') || {}).value || 'todos';
  const filtered = nominaData.filter(r => filtro === 'todos' || r.puesto === filtro);
  const realIndices = nominaData.reduce((acc, r, i) => {
    if (filtro === 'todos' || r.puesto === filtro) acc.push(i);
    return acc;
  }, []);

  if (countEl) countEl.textContent = `${filtered.length} registro${filtered.length !== 1 ? 's' : ''}`;

  // Summary
  const gastoBruto = nominaData.reduce((s, r) => s + (r.salarioBase||0) + (r.horasExtra||0) + (r.viaticos||0), 0);
  const totalPagado = nominaData.reduce((s, r) => s + (r.monto || 0), 0);
  const totalAhorro = nominaData.reduce((s, r) => s + (r.descuentoAhorro || 0), 0);
  const grupos = {};
  nominaData.forEach(r => { grupos[r.puesto] = (grupos[r.puesto] || 0) + 1; });
  const numCategorias = Object.keys(grupos).length;

  if (summary) summary.innerHTML = `
    <div class="nomina-stat"><div class="nomina-stat-label">Total Registros</div><div class="nomina-stat-val" style="color:#db2777">${nominaData.length}</div></div>
    <div class="nomina-stat"><div class="nomina-stat-label">Gasto Nómina (bruto)</div><div class="nomina-stat-val" style="color:#dc2626;font-size:16px">${gastoBruto > 0 ? fmt(gastoBruto) : '—'}</div></div>
    <div class="nomina-stat"><div class="nomina-stat-label">Total Pagado (neto)</div><div class="nomina-stat-val" style="color:#16a34a;font-size:16px">${totalPagado > 0 ? fmt(totalPagado) : '—'}</div></div>
    <div class="nomina-stat"><div class="nomina-stat-label">En Caja de Ahorro</div><div class="nomina-stat-val" style="color:#0891b2;font-size:16px">${totalAhorro > 0 ? fmt(totalAhorro) : '—'}</div></div>
    <div class="nomina-stat"><div class="nomina-stat-label">Tipos activos</div><div class="nomina-stat-val" style="color:#1d4ed8">${numCategorias}</div></div>`;

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    if (empty) empty.style.display = 'block';
  } else {
    if (empty) empty.style.display = 'none';

    tbody.innerHTML = filtered.map((r, fi) => {
      const ri = realIndices[fi];
      const cat = NOMINA_CATALOG[r.puesto] || { label: r.puesto, color: '#db2777' };
      return `<tr id="nomina-row-${ri}">
        <td style="color:var(--gray-400);font-size:11px">${fi + 1}</td>
        <td><span class="nomina-chip" style="background:${cat.color}18;color:${cat.color}">${cat.label}</span></td>
        <td style="font-weight:500">${r.persona}</td>
        <td style="text-align:right">
          <input class="editable" type="number" value="${r.salarioBase || ''}" placeholder="0"
            style="max-width:85px" onchange="updateNominaVal(${ri},'salarioBase',this.value)"/>
        </td>
        <td style="text-align:right;color:#16a34a">
          ${r.tieneHorasExtra ? `<input class="editable" type="number" value="${r.horasExtra||''}" placeholder="0" style="max-width:75px;color:#16a34a" onchange="updateNominaVal(${ri},'horasExtra',this.value)"/>` : '—'}
        </td>
        <td style="text-align:right;color:#16a34a">
          ${r.tieneViaticos ? `<input class="editable" type="number" value="${r.viaticos||''}" placeholder="0" style="max-width:75px;color:#16a34a" onchange="updateNominaVal(${ri},'viaticos',this.value)"/>` : '—'}
        </td>
        <td style="text-align:right;color:#0891b2">
          ${r.tieneAhorro ? `<input class="editable" type="number" value="${r.descuentoAhorro||''}" placeholder="0" style="max-width:75px;color:#0891b2" onchange="updateNominaVal(${ri},'descuentoAhorro',this.value)"/>` : '—'}
        </td>
        <td style="text-align:right;font-weight:600;color:#db2777">${fmt(r.monto)}</td>
        <td style="text-align:right;color:#7c3aed">
          ${r.tieneMartillo ? `<input class="editable" type="number" value="${r.martillo||''}" placeholder="0" style="max-width:75px;color:#7c3aed" onchange="updateNominaVal(${ri},'martillo',this.value)"/>` : '—'}
        </td>
        <td>
          <div class="acciones-cell">
            <button class="btn-print-cliente" onclick='generarTicketNomina(nominaData[${ri}])' title="Ver / reimprimir recibo">🧾</button>
            <button class="btn-viaje-del" onclick="eliminarNomina(${ri})" title="Eliminar registro">
              <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><line x1="2" y1="2" x2="12" y2="12"/><line x1="12" y1="2" x2="2" y2="12"/></svg>
              Eliminar
            </button>
          </div>
        </td>
      </tr>`;
    }).join('');

    // Total row
    const total = filtered.reduce((s, r) => s + (r.monto || 0), 0);
    tbody.innerHTML += `<tr class="total-row">
      <td colspan="6">Total pagado ${filtro !== 'todos' ? '(filtrado)' : ''}</td>
      <td style="text-align:right;color:#db2777">${fmt(total)}</td>
      <td colspan="2"></td>
    </tr>`;
  }

  renderNominaAhorroTable();
}

// Suma, por persona, cuánto se le ha descontado de caja de ahorro en todos sus
// registros — así se sabe cuánto hay que devolverle.
function renderNominaAhorroTable() {
  const tbody = document.getElementById('nominaAhorroTbody');
  const empty = document.getElementById('nominaAhorroEmpty');
  if (!tbody) return;

  const porPersona = {};
  nominaData.forEach(r => {
    if (!r.descuentoAhorro) return;
    const key = r.persona + '||' + r.puesto;
    if (!porPersona[key]) porPersona[key] = { persona: r.persona, puesto: r.puesto, total: 0, aportaciones: 0 };
    porPersona[key].total += r.descuentoAhorro;
    porPersona[key].aportaciones += 1;
  });

  const filas = Object.values(porPersona).sort((a,b) => b.total - a.total);

  if (filas.length === 0) {
    tbody.innerHTML = '';
    if (empty) empty.style.display = 'block';
    return;
  }
  if (empty) empty.style.display = 'none';

  tbody.innerHTML = filas.map(f => {
    const cat = NOMINA_CATALOG[f.puesto] || { label: f.puesto, color: '#0891b2' };
    return `<tr>
      <td style="font-weight:500">${f.persona}</td>
      <td><span class="nomina-chip" style="background:${cat.color}18;color:${cat.color}">${cat.label}</span></td>
      <td style="text-align:center">${f.aportaciones}</td>
      <td style="text-align:right;font-weight:600;color:#0891b2">${fmt(f.total)}</td>
    </tr>`;
  }).join('');
}

// Genera un ticket imprimible con todos los datos ya seleccionados del pago de nómina.
function generarTicketNomina(r) {
  const cat = NOMINA_CATALOG[r.puesto] || { label: r.puesto, color:'#db2777' };
  const fecha = r.fecha || new Date().toLocaleDateString('es-MX', { day:'2-digit', month:'short', year:'numeric' });

  const filas = [
    { label: 'Salario fijo', val: r.salarioBase, color:'#0f172a' },
  ];
  if (r.tieneHorasExtra) filas.push({ label: '+ Horas extra', val: r.horasExtra, color:'#16a34a' });
  if (r.tieneViaticos) filas.push({ label: '+ Viáticos', val: r.viaticos, color:'#16a34a' });
  if (r.tieneMartillo) filas.push({ label: '+ Hrs. Rotomartillo', val: r.martillo, color:'#7c3aed' });
  if (r.tieneAhorro) filas.push({ label: '− Caja de ahorro', val: -r.descuentoAhorro, color:'#0891b2' });

  const filasHtml = filas.map(f => `
    <tr>
      <td style="padding:7px 0;font-size:12.5px;color:#475569">${f.label}</td>
      <td style="padding:7px 0;font-size:12.5px;text-align:right;font-weight:600;color:${f.color}">${f.val<0?'-':''}${fmt(Math.abs(f.val))}</td>
    </tr>`).join('');

  const html = `<!DOCTYPE html><html lang="es"><head>
<meta charset="UTF-8">
<title>FLOSAN — Recibo de Nómina — ${r.persona}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;color:#0f172a;background:#f1f5f9;padding:32px;font-size:13px;display:flex;justify-content:center}
  @media print{body{padding:0;background:#fff}}
  .ticket{background:#fff;width:360px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,0.08);padding:26px 24px;border:1px solid #e2e8f0}
  .brand{font-size:19px;font-weight:700;letter-spacing:-0.5px;text-align:center}
  .brand em{color:#4ade80;font-style:normal}
  .sub{font-size:11px;color:#64748b;text-align:center;margin-top:2px;margin-bottom:16px}
  .divider{border-top:1px dashed #cbd5e1;margin:14px 0}
  .persona{font-size:17px;font-weight:700;text-align:center}
  .chip{display:inline-block;margin:6px auto 0;background:${cat.color}18;color:${cat.color};padding:3px 12px;border-radius:20px;font-size:11px;font-weight:600}
  .chip-wrap{text-align:center}
  .fecha{font-size:11px;color:#94a3b8;text-align:center;margin-top:6px}
  table{width:100%;border-collapse:collapse}
  .total-row td{padding-top:12px;border-top:2px solid #0f172a;font-size:15px;font-weight:700}
  .no-print{margin-bottom:16px;display:flex;gap:8px;width:360px}
  .btn{display:inline-flex;align-items:center;gap:5px;background:#0f172a;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;flex:1;justify-content:center}
  .btn-sec{background:#f1f5f9;color:#334155;border:1px solid #e2e8f0}
  @media print{.no-print{display:none!important}}
  .footer{margin-top:18px;font-size:10px;color:#94a3b8;text-align:center}
</style>
</head><body>
<div style="display:flex;flex-direction:column;align-items:center">
<div class="no-print">
  <button class="btn" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
  <button class="btn btn-sec" onclick="window.close()">✕ Cerrar</button>
</div>
<div class="ticket">
  <div class="brand">FLOS<em>AN</em></div>
  <div class="sub">Recibo de pago de nómina</div>
  <div class="divider"></div>
  <div class="persona">${r.persona}</div>
  <div class="chip-wrap"><span class="chip">${cat.label}</span></div>
  <div class="fecha">Generado el ${fecha}</div>
  <div class="divider"></div>
  <table>
    <tbody>${filasHtml}</tbody>
    <tr class="total-row"><td>Total a pagar</td><td style="text-align:right;color:#db2777">${fmt(r.monto)}</td></tr>
  </table>
  <div class="footer">FLOSAN · Control Financiero 2026</div>
</div>
</div>
</body></html>`;

  const win = window.open('', '_blank', 'width=460,height=680');
  win.document.write(html);
  win.document.close();
}

function init() {
  cargarDatos();
  migrarYRecalcularDiario();
  recalcNominaEnGastos();
  recalcTodasCategoriasEnGastosTotal();
  buildSideNav();
  const container=document.getElementById('sections');
  let html=`<div class="section" id="sec_dashboard">${buildDashboard()}</div>`;
  html+=`<div class="section" id="sec_viajes">${buildViajes()}</div>`;
  html+=`<div class="section" id="sec_maq_retro">${buildRetro()}</div>`;
  html+=`<div class="section" id="sec_maq_ligera">${buildMaqLig()}</div>`;
  html+=`<div class="section" id="sec_nomina_reg">${buildNominaReg()}</div>`;
  MODULES.forEach(m=>{ html+=`<div class="section" id="sec_${m.id}">${buildModule(m)}</div>`; });
  container.innerHTML=html;
  MODULES.forEach(m=>renderModuleTable(m));
  setTimeout(renderViajesTable, 50);
  setTimeout(renderRetroTable, 50);
  setTimeout(renderMaqLigTable, 50);
  setTimeout(renderDieselEqTable, 50);
  setTimeout(renderNominaTable, 50);

  // Si el dashboard ya está desbloqueado mostrarlo, si no mostrar Viajes por defecto
  if (dashDesbloqueado) {
    activeTab = 'dashboard';
    document.getElementById('sec_dashboard').classList.add('visible');
    document.getElementById('topbarTitle').textContent = 'Dashboard';
    document.getElementById('topbarSub').textContent = 'Resumen general';
    setTimeout(refreshDashboard, 100);
  } else {
    activeTab = 'viajes';
    document.getElementById('sec_viajes').classList.add('visible');
    document.getElementById('topbarTitle').textContent = 'Viajes';
    document.getElementById('topbarSub').textContent = 'Registro de viajes';
    buildSideNav();
  }
}
init();
